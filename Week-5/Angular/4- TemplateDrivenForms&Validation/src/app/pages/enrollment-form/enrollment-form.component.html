<div class="container">
  <h2>Enrollment Request</h2>

  <div *ngIf="submitted" class="success">
    Enrollment request submitted successfully!
  </div>

  <form #enrollForm="ngForm" (ngSubmit)="onSubmit(enrollForm)" *ngIf="!submitted">

    <div class="field">
      <label>Student Name</label>
      <input
        type="text"
        name="studentName"
        [(ngModel)]="studentName"
        #nameCtrl="ngModel"
        required
        minlength="3" />
      <span class="error" *ngIf="nameCtrl.touched && nameCtrl.errors?.['required']">
        Name is required.
      </span>
      <span class="error" *ngIf="nameCtrl.touched && nameCtrl.errors?.['minlength']">
        Name must be at least 3 characters.
      </span>
    </div>

    <div class="field">
      <label>Email</label>
      <input
        type="email"
        name="studentEmail"
        [(ngModel)]="studentEmail"
        #emailCtrl="ngModel"
        required
        email />
      <span class="error" *ngIf="emailCtrl.touched && emailCtrl.errors?.['required']">
        Email is required.
      </span>
      <span class="error" *ngIf="emailCtrl.touched && emailCtrl.errors?.['email']">
        Enter a valid email.
      </span>
    </div>

    <div class="field">
      <label>Course ID</label>
      <input
        type="number"
        name="courseId"
        [(ngModel)]="courseId"
        #courseCtrl="ngModel"
        required />
      <span class="error" *ngIf="courseCtrl.touched && courseCtrl.errors?.['required']">
        Course ID is required.
      </span>
    </div>

    <div class="field">
      <label>Preferred Semester</label>
      <select name="preferredSemester" [(ngModel)]="preferredSemester" required>
        <option value="Odd">Odd</option>
        <option value="Even">Even</option>
      </select>
    </div>

    <div class="field checkbox">
      <input
        type="checkbox"
        name="agreeToTerms"
        [(ngModel)]="agreeToTerms"
        #termsCtrl="ngModel"
        required />
      <label>I agree to the terms and conditions</label>
      <span class="error" *ngIf="termsCtrl.touched && termsCtrl.errors?.['required']">
        You must agree to the terms.
      </span>
    </div>

    <div class="buttons">
      <button type="submit" [disabled]="enrollForm.invalid">Submit</button>
      <button type="button" (click)="enrollForm.resetForm()">Reset</button>
    </div>

  </form>
</div>
