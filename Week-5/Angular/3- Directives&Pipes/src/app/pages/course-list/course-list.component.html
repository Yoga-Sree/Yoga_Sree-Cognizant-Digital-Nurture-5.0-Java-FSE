<div class="container">
  <h2>Courses</h2>

  <p *ngIf="isLoading">Loading courses...</p>

  <ng-container *ngIf="!isLoading">
    <div class="grid" *ngIf="courses.length > 0; else noCourses">
      <app-course-card
        *ngFor="let course of courses; trackBy: trackByCourseId"
        [course]="course">
      </app-course-card>
    </div>
    <ng-template #noCourses>
      <p>No courses available.</p>
    </ng-template>
  </ng-container>
</div>
