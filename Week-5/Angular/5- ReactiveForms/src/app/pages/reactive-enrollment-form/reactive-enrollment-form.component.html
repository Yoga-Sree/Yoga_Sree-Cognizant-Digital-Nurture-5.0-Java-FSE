<div class="container">
  <h2>Reactive Enrollment Form</h2>

  <form [formGroup]="enrollForm" (ngSubmit)="onSubmit()">

    <div class="field">
      <label>Student Name</label>
      <input type="text" formControlName="studentName" />
      <span class="error" *ngIf="enrollForm.get('studentName')?.touched && enrollForm.get('studentName')?.errors?.['required']">
        Name is required.
      </span>
      <span class="error" *ngIf="enrollForm.get('studentName')?.touched && enrollForm.get('studentName')?.errors?.['minlength']">
        Name must be at least 3 characters.
      </span>
    </div>

    <div class="field">
      <label>Email</label>
      <input type="email" formControlName="studentEmail" />
      <span class="error" *ngIf="enrollForm.get('studentEmail')?.touched && enrollForm.get('studentEmail')?.errors?.['required']">
        Email is required.
      </span>
      <span class="error" *ngIf="enrollForm.get('studentEmail')?.touched && enrollForm.get('studentEmail')?.errors?.['email']">
        Enter a valid email.
      </span>
      <span class="error" *ngIf="enrollForm.get('studentEmail')?.errors?.['emailTaken']">
        This email is already taken.
      </span>
    </div>

    <div class="field">
      <label>Course ID</label>
      <input type="text" formControlName="courseId" />
      <span class="error" *ngIf="enrollForm.get('courseId')?.touched && enrollForm.get('courseId')?.errors?.['required']">
        Course ID is required.
      </span>
      <span class="error" *ngIf="enrollForm.get('courseId')?.errors?.['noCourseCode']">
        Course code starting with XX is not allowed.
      </span>
    </div>

    <div class="field">
      <label>Preferred Semester</label>
      <select formControlName="preferredSemester">
        <option value="Odd">Odd</option>
        <option value="Even">Even</option>
      </select>
    </div>

    <div class="field checkbox">
      <input type="checkbox" formControlName="agreeToTerms" />
      <label>I agree to the terms and conditions</label>
    </div>

    <div class="additional">
      <h4>Additional Courses</h4>
      <div *ngFor="let ctrl of additionalCourses.controls; let i = index" class="extra-course">
        <input [formControl]="ctrl" placeholder="Course code" />
        <button type="button" (click)="removeCourse(i)">Remove</button>
      </div>
      <button type="button" (click)="addCourse()">+ Add Another Course</button>
    </div>

    <button type="submit" [disabled]="enrollForm.invalid">Submit</button>

  </form>
</div>
